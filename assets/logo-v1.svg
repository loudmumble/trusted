<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="chainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#cba6f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#94e2d5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- PKI background -->
  <rect width="400" height="400" fill="#11111b"/>
  
  <!-- Certificate chain -->
  <g stroke="#45475a" stroke-width="3">
    <line x1="200" y1="80" x2="200" y2="140"/>
    <line x1="200" y1="180" x2="200" y2="240"/>
    <line x1="200" y1="280" x2="200" y2="340"/>
  </g>
  
  <!-- Certificates -->
  <g fill="url(#chainGrad)">
    <rect x="160" y="60" width="80" height="40" rx="5"/>
    <rect x="160" y="160" width="80" height="40" rx="5" opacity="0.8"/>
    <rect x="160" y="260" width="80" height="40" rx="5" opacity="0.6"/>
  </g>
  
  <!-- Labels -->
  <g fill="#1e1e2e" font-family="monospace" font-size="8" text-anchor="middle">
    <text x="200" y="85">ROOT CA</text>
    <text x="200" y="185">INTER CA</text>
    <text x="200" y="285">END CERT</text>
  </g>
  
  <!-- Exploit indicators -->
  <g fill="#f38ba8">
    <circle cx="280" cy="140" r="12"><animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite"/></circle>
    <text x="280" y="145" text-anchor="middle" fill="#1e1e2e" font-size="14" font-weight="bold">!</text>
    <circle cx="120" cy="240" r="10"><animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/></circle>
    <text x="120" y="244" text-anchor="middle" fill="#1e1e2e" font-size="12" font-weight="bold">⚠</text>
  </g>
  
  <!-- Chain break -->
  <g stroke="#f38ba8" stroke-width="2" stroke-dasharray="4,4">
    <line x1="180" y1="140" x2="220" y2="180"/>
    <line x1="220" y1="140" x2="180" y2="180"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="370" text-anchor="middle" fill="#cba6f7" font-family="monospace" font-size="28" font-weight="bold" letter-spacing="3">TRUSTED</text>
  <text x="200" y="395" text-anchor="middle" fill="#6c7086" font-family="monospace" font-size="10" letter-spacing="2">PKI ATTACK FRAMEWORK</text>
</svg>